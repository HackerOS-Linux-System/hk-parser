[package]
name = "hk-parser"
version = "1.6.2"
authors = ["HackerOS Team <hackeros068@gmail.com>"]
edition = "2021"
license = "MIT"
description = "A robust parser and serializer for Hacker Lang configuration files (.hk)."
readme = "README.md"
repository = "" # Add your repository URL if available
keywords = ["hacker-lang", "parser", "configuration", "hk-format"]
categories = ["parser-implementations", "config"]

[dependencies]
nom = "7.1.3" # For parsing
serde = { version = "1.0", features = ["derive"] } # For potential serialization extensions
thiserror = "1.0" # For custom errors

[dev-dependencies]
pretty_assertions = "1.4" # For better test assertions

[lib]
name = "hk_parser"
path = "src/lib.rs"
